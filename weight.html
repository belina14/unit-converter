<!DOCTYPE html>

<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <title>Unit Converter - Weight</title>
</head>

<body>
<h1>Unit Converter</h1>

<div class="tab">
  <button class="tablinks" onclick="location.href='length.html'">Length</button>
  <button class="tablinks active" onclick="location.href='weight.html'">Weight</button>
  <button class="tablinks" onclick="location.href='temperature.html'">Temperature</button>
</div>

<section class="card">
<form>
<div>
<input type="number" id="weightInput" placeholder="Enter value">
<select id="fromUnit" class="dropdown">
  <option value="g">Grams</option>
  <option value="kg">Kilograms</option>
  <option value="mt">Metric Tons</option>
  <option value="oz">Ounces</option>
  <option value="lb">Pounds</option>
</select>
</div>

<div>
<input type="number" id="weightOutput" value="0" readonly>
<select id="toUnit" class="dropdown">
  <option value="g">Grams</option>
  <option value="kg">Kilograms</option>
  <option value="mt">Metric Tons</option>
  <option value="oz">Ounces</option>
  <option value="lb">Pounds</option>
</select>
</div>
<input type="button" value="Convert" onclick="convertWeight()" class="convert-button"   >
</form>
</section>

</body>

<script src="script.js"></script>

</html>
