<!DOCTYPE html>

<html lang="en">

<head>
    <title>Unit Converter - Weight</title>
</head>

<body>
<h1>Unit Converter</h1>

<div class="tab">
  <button class="tablinks" onclick="location.href='length.html'">Length</button>
  <button class="tablinks active" onclick="location.href='weight.html'">Weight</button>
  <button class="tablinks" onclick="location.href='temperature.html'">Temperature</button>
</div>

<form>
<div>
<input type="number" id="weightInput" placeholder="Enter value">
<select>
  <option id="g" value="g">Grams</option>
  <option id="kg" value="kg">Kilograms</option>
  <option id="mt" value="mt">Metric Tons</option>
  <option id="oz" value="oz">Ounces</option>
  <option id="lb" value="lb">Pounds</option>
</select>
</div>

<div>
<input type="number" id="weightOutput" value="0" readonly>
<select>
  <option id="g" value="g">Grams</option>
  <option id="kg" value="kg">Kilograms</option>
  <option id="mt" value="mt">Metric Tons</option>
  <option id="oz" value="oz">Ounces</option>
  <option id="lb" value="lb">Pounds</option>
</select>
</div>
<input type="button" value="Convert" onclick="convertWeight()">
</form>

</body>

</html>
