<!DOCTYPE html>

<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <title>Unit Converter - Length</title>
</head>

<body>
<h1>Unit Converter</h1>

<div class="tab">
  <button class="tablinks active" onclick="location.href='length.html'">Length</button>
  <button class="tablinks" onclick="location.href='weight.html'">Weight</button>
  <button class="tablinks" onclick="location.href='temperature.html'">Temperature</button>
</div>

<section class="card">
<form>
<div>
<input type="number" id="lengthInput" placeholder="Enter value">
<select id="fromUnit" class="dropdown">
  <option value="cm">Centimeters</option>
  <option value="m">Meters</option>
  <option value="km">Kilometers</option>
  <option value="in">Inches</option>
  <option value="ft">Feet</option>
</select>
</div>

<div>
<input type="number" id="lengthOutput" value="0" readonly>
<select id="toUnit" class="dropdown">
  <option value="cm">Centimeters</option>
  <option value="m">Meters</option>
  <option value="km">Kilometers</option>
  <option value="in">Inches</option>
  <option value="ft">Feet</option>
</select>
</div>
<input type="button" value="Convert" onclick="convertLength()" class="convert-button"  >
</form>
</section>

</body>

<script src="script.js"></script>
</html>
