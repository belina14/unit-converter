<!DOCTYPE html>

<html lang="en">

<head>
    <title>Unit Converter - Length</title>
</head>

<body>
<h1>Unit Converter</h1>

<div class="tab">
  <button class="tablinks active" onclick="location.href='length.html'">Length</button>
  <button class="tablinks" onclick="location.href='weight.html'">Weight</button>
  <button class="tablinks" onclick="location.href='temperature.html'">Temperature</button>
</div>

<form>
<div>
<input type="number" id="lengthInput" placeholder="Enter value">
<select>
  <option id="cm" value="cm">Centimeters</option>
  <option id="m" value="m">Meters</option>
  <option id="km" value="km">Kilometers</option>
  <option id="in" value="in">Inches</option>
  <option id="ft" value="ft">Feet</option>
</select>
</div>

<div>
<input type="number" id="lengthOutput" value="0" readonly>
<select>
  <option id="cm" value="cm">Centimeters</option>
  <option id="m" value="m">Meters</option>
  <option id="km" value="km">Kilometers</option>
  <option id="in" value="in">Inches</option>
  <option id="ft" value="ft">Feet</option>
</select>
</div>
<input type="button" value="Convert" onclick="convertLength()">
</form>

</body>

<script src="script.js"></script>
</html>
